schema_version: 1

context:
  version: "1.1.7"

package:
  name: livekit-protocol
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/livekit-protocol/livekit_protocol-${{ version }}.tar.gz
    sha256: d8b1352be03950d27a602e8978533826da68fbd59882ddf114b7bcc17d752f97
  - url: https://raw.githubusercontent.com/livekit/python-sdks/refs/tags/protocol-v${{ version }}/LICENSE
    sha256: c71d239df91726fc519c6eb72d318ec65820627232b2f796219e87dcf35d0ab4
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - protobuf >=4
    - types-protobuf >=4

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - livekit.protocol
      pip_check: true

about:
  summary: Python protocol stubs for LiveKit
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/livekit-protocol/
  repository: https://github.com/livekit/python-sdks/
  documentation: https://docs.livekit.io

extra:
  recipe-maintainers:
    - conda-forge/livekit
